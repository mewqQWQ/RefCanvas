<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#d96b2b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RefCanvas" />
    <title>RefCanvas</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">R</span>
          <div>
            <h1>RefCanvas</h1>
            <p>为手机和平板设计的参考图板</p>
          </div>
        </div>
        <button id="installButton" class="ghost-button hidden" type="button">安装</button>
      </header>

      <section class="mobile-strip" aria-label="快捷操作">
        <button type="button" data-action="fit">适应</button>
        <button type="button" data-action="locate">定位</button>
        <button type="button" data-action="focus">专注</button>
        <button type="button" data-action="arrange">排布</button>
        <button type="button" data-action="duplicate">复制</button>
        <button type="button" data-action="delete" class="danger">删除</button>
        <button type="button" data-action="export-png">PNG</button>
        <button type="button" data-action="export-json">项目</button>
      </section>

      <main class="workspace">
        <section class="board-wrap">
          <div id="boardViewport" class="board-viewport" aria-label="参考板画布">
            <div id="board" class="board"></div>
            <div class="board-hint" id="emptyHint">
              <h2>把参考图放到这里</h2>
              <p>支持拖入、粘贴、拍照上传，双指缩放，单指拖动画布或图片。</p>
            </div>
          </div>
        </section>

        <aside class="inspector">
          <div class="panel">
            <h2>选中内容</h2>
            <div id="selectionMeta" class="meta-block">尚未选中图片</div>
            <div class="action-grid">
              <button id="bringFrontButton" type="button">置顶</button>
              <button id="sendBackButton" type="button">置底</button>
              <button id="duplicateButton" type="button">复制</button>
              <button id="deleteButton" type="button" class="danger">删除</button>
            </div>
          </div>

          <div class="panel">
            <h2>项目</h2>
            <div class="action-grid">
              <button id="fitButton" type="button">适应视图</button>
              <button type="button" data-action="locate">定位图片</button>
              <button id="arrangeButton" type="button">自动排布</button>
              <button id="exportPngButton" type="button">导出 PNG</button>
              <button id="exportJsonButton" type="button">导出项目</button>
              <button id="importJsonButton" type="button">导入项目</button>
              <button id="clearButton" type="button" class="danger ghost-tone">清空画板</button>
            </div>
          </div>
        </aside>
      </main>

      <nav class="bottom-bar" aria-label="主工具栏">
        <label class="primary-action upload-button">
          <input id="imageInput" type="file" accept="image/*" multiple hidden />
          <span>导入图片</span>
        </label>
        <button id="cameraButton" type="button">拍照</button>
        <button id="toggleLockButton" type="button">锁定移动</button>
        <button id="resetZoomButton" type="button">100%</button>
        <button type="button" data-action="focus">专注</button>
      </nav>
    </div>

    <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
    <input id="projectInput" type="file" accept="application/json" hidden />

    <template id="itemTemplate">
      <article class="board-item">
        <img alt="" draggable="false" />
        <button class="resize-handle" type="button" aria-label="缩放图片"></button>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
